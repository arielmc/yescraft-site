<title>You're Magical | YesCraft.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
<style>
  :root { --ink: #0c1222; --paper: #f6f4ef; --accent: #e05a4f; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; -webkit-font-smoothing: antialiased; }
  .thank-you { max-width: 540px; }
  .sparkle { font-size: 3rem; margin-bottom: 1.5rem; display: block; }

  h1 span { color: var(--accent); }
  .message { font-size: 1.1rem; line-height: 1.6; color: rgba(12, 18, 34, 0.7); margin-bottom: 1.5rem; }
  .socials { display: flex; gap: 1.5rem; justify-content: center; margin-bottom: 2rem; }
  .socials a { display: inline-flex; align-items: center; gap: 0.4rem; font-weight: 600; font-size: 0.88rem; color: var(--ink); text-decoration: none; opacity: 0.5; letter-spacing: 0.02em; transition: all 0.3s ease; }
  .socials a:hover { opacity: 1; color: var(--accent); }
  .back-link { display: inline-block; font-weight: 600; font-size: 0.9rem; color: var(--accent); text-decoration: none; letter-spacing: 0.03em; transition: opacity 0.3s ease; }
  .back-link:hover { opacity: 0.7; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: var(--ink); text-decoration: none; position: absolute; top: 2rem; left: 2rem; }
  .logo span { color: var(--accent); }
</style>
</head>
<body>
<a href="/" class="logo">YesCraft<span>.</span>ai</a>
<div class="thank-you">

  <h1 id="heading">You're <span>magical</span>.</h1>
  <p class="message" id="message">We got your message and will get back to you ASAP.</p>

<script>
  try {
    var name = sessionStorage.getItem('yc_name');
    if (name && name.trim() && name !== 'null' && name !== 'undefined') {
      var first = name.trim().split(' ')[0];
      document.getElementById('heading').innerHTML = first + ', you\'re <span>magical</span>.';
      document.getElementById('message').textContent = 'We got your message, ' + first + ', and will get back to you ASAP.';
      sessionStorage.removeItem('yc_name');
    }
  } catch(e) {}
</script>
</body>
